services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env.example
    volumes:
      # Cache model downloads so they survive container rebuilds
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/.cache/torch:/root/.cache/torch

  frontend:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
